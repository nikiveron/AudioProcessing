version: "3.9"

services:

  backend:
    build:
      context: ./
      dockerfile: ./backend/AudioProcessing.API/Dockerfile
    container_name: audio_backend
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - minio
      - kafka
    ports:
      - "5000:8080"  
    networks:
      - audio_net


  worker:
    build:
      context: ./
      dockerfile: ./workers/AudioProcessing.Worker/Dockerfile
    container_name: audio_worker
    restart: always
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
      backend:
        condition: service_started
    networks:
      - audio_net

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: audio_ml_service
    restart: always
    env_file:
      - .env
    depends_on:
      - kafka
      - minio
    networks:
      - audio_net
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/app:/app

  postgres:
    image: postgres:15
    container_name: audio_postgres
    restart: always
    environment:
      POSTGRES_USER: audio
      POSTGRES_PASSWORD: audio123
      POSTGRES_DB: audio_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - audio_net

  minio:
    image: minio/minio:latest
    container_name: audio_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   
      - "9001:9001"   
    volumes:
      - minio_data:/data
    networks:
      - audio_net


  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: audio_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - audio_net


  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: audio_kafka
    restart: always
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    networks:
      - audio_net

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: audio_kafka_setup
    restart: "no"
    networks:
      - audio_net
    depends_on:
      kafka:
        condition: service_healthy 
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
      echo 'Ожидание готовности Kafka...'
      sleep 10
      echo 'Создание топиков...'
      
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic job.created --partitions 1 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic job.prepared --partitions 1 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic job.completed --partitions 1 --replication-factor 1
      
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic job.failed --partitions 1 --replication-factor 1
      
      echo 'Топики созданы:'
      kafka-topics --list --bootstrap-server kafka:9092
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: audio_kafka_ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - audio_net


  redis:
    image: redis:7
    container_name: audio_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - audio_net
    volumes:
      - redis_data:/data


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: audio_pgadmin
    restart: always
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - audio_net
    volumes:
      - pgadmin_data:/var/lib/pgadmin


networks:
  audio_net:
    driver: bridge

volumes:
  pg_data:
  minio_data:
  redis_data:
  pgadmin_data:



